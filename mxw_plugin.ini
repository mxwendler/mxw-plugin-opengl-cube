[mxw_plugin]                            ; must be here
plugin_version = 1                      ; must be V1
plugin_script_language = Python         ; must be Python
plugin_menu_level = development         ; disabled->invisible, development->in debug builds
plugin_media_scheme = generative                      ; media addressed as "generative://<payload>"
plugin_media_payload = cube_spin_opengl               ; this plugin handles exactly "generative://cube_spin_opengl"
plugin_media_create_uri = generative://cube_spin_opengl ; media created by the 'Create' button
plugin_menu_parent = Media
plugin_menu_name = Spinning Cube
plugin_grid_name = Cube
plugin_tooltip = Renders a spinning OpenGL cube into a media surface. Address: generative://cube_spin_opengl
